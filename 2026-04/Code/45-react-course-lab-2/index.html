<!DOCTYPE html>
<html>
<head>
    <title>My Library</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>

</head>
<body>

<div id='root'></div>

<script type="importmap">
{
    "imports": {
        "react": "https://esm.sh/react",
        "react-dom/client": "https://esm.sh/react-dom/client"
    }
}
</script>

<script type="module">
    import React from "react"
    import { createRoot } from "react-dom/client"
    
    class Book {
        constructor(title, author) {
            this.title = title
            this.author = author
        }

        toString() {
            return `${this.title}, by ${this.author}`
        }
    }

    class Film {
        constructor(name, genre, blurb) {
            this.name = name
            this.genre = genre
            this.blurb = blurb
        }

        toString() {
            return `${this.name} [${this.genre}], ${this.blurb}`
        }
    }

    const books = [
        new Book('Millennium', 'Stieg Larsson'),
        new Book('A Christmas Carol', 'Charles Dickens'),
        new Book('The Son', 'Jo Nesbo'),
    ];

    const films = [
        new Film('Airplane', 'Comedy', 'Classic plane spoof'),
        new Film('Skyfall', 'Adventure', 'Bond spy yarn'),
        new Film('Love Actually', 'RomCom', ' Hugh Grant playing Hugh Grant'),
        new Film('Mission Impossible', 'Adventure', ' Hi-octane stunt fest')
    ];

    class ItemsList extends React.Component {
        render() {
            let tagName = this.props.ordered ? 'ol' : 'ul';

            return React.createElement(tagName, null,
                this.props.items.map((item, i) => React.createElement('li', {key: i}, item.toString()))
            );
        }
    }


    class App extends React.Component {
        render() {
            return React.createElement('div', null, 
                React.createElement('h1', null, 'My Library'),
                React.createElement('h2', null, 'Books'),
                React.createElement(ItemsList, {items: books, ordered: true}, null),
                React.createElement('h2', null, 'Films'),
                React.createElement(ItemsList, {items: films, ordered: false}, null)
            );
        }
    }

    const app = React.createElement(App);    
    const root = createRoot(document.getElementById('root'));
    root.render(app);

</script>

</body>
</html>
