<!DOCTYPE html>
<html>
<head>
    <title>My Library</title>
    <link href="main.css" rel="stylesheet">
</head>
<body>

<div id='root'></div>

<script src="https://unpkg.com/@babel/standalone/babel.js"></script>

<script type="importmap">
{
    "imports": {
        "react": "https://esm.sh/react",
        "react-dom/client": "https://esm.sh/react-dom/client"
    }
}
</script>

<script data-type="module" type="text/babel">
    import React from "react"
    import { createRoot } from "react-dom/client"
    
    class Book {
        constructor(title, author) {
            this.title = title
            this.author = author
        }

        toString() {
            return `${this.title}, by ${this.author}`
        }
    }

    class Film {
        constructor(name, genre, blurb) {
            this.name = name
            this.genre = genre
            this.blurb = blurb
        }

        toString() {
            return `${this.name} [${this.genre}], ${this.blurb}`
        }
    }

    const books = [
        new Book('Millennium', 'Stieg Larsson'),
        new Book('A Christmas Carol', 'Charles Dickens'),
        new Book('The Son', 'Jo Nesbo'),
    ]

    const films = [
        new Film('Airplane', 'Comedy', 'Classic plane spoof'),
        new Film('Skyfall', 'Adventure', 'Bond spy yarn'),
        new Film('Love Actually', 'RomCom', ' Hugh Grant playing Hugh Grant'),
        new Film('Mission Impossible', 'Adventure', ' Hi-octane stunt fest')
    ]

    function ItemsList({items, ordered}) {
        const Elem = ordered ? "ol" : "ul";

        return (
            <Elem>
                {items.map((item, i) => 
                    <li key={i}> {item.toString()} </li>
                )}
            </Elem>
        );
    }

    function Table({items}) {
        return (
            <table>
                <TableHead sampleObject={items[0]} />
                <TableBody objects={items} />
            </table>
        );
    }

    function TableHead({sampleObject}) {
        return (
            <thead>
                <TableRow data={Object.keys(sampleObject)} head={true} />
            </thead>
        );
    }
    
    function TableBody({objects}) {
        return (
            <tbody>
                {objects.map((obj, i) => 
                    <TableRow key={i} data={Object.values(obj)} head={false} />
                )}
            </tbody>
        );
    }

    function TableRow({head, data}) {
        const Elem = head ? "th" : "td";

        return (
            <tr>
                {data.map((d,i) => 
                    <Elem key={i}>
                        {d}
                    </Elem>
                )}
            </tr>
        );
    }

    function App() {
        return (
            <div>
                <h1>My Library</h1>
                <h2>Books List</h2>
                <ItemsList items={books} oredered={true} />
                <h2>Films List</h2>
                <ItemsList items={films} oredered={false} />
                <h2>Books Table</h2>
                <Table items={books} />
                <h2>Films Table</h2>
                <Table items={films} />
            </div>
        );
    }
    
    const root = createRoot(document.getElementById('root'))
    root.render(React.createElement(App))

</script>

</body>
</html>
