<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Calculator</title>
</head>
<body>
    
    <section id="calculator">
        <h2 class="hidden">Calculator</h2>
        <div id="viewport">
            <p id="viewportContent"></p>
        </div>


        <div id="topFunctionality">
            <button id="clearViewport">clear</button>
            <!-- <button id="leftBracket" class="numButton" data-value="(">(</button>
            <button id="rightBracket" class="numButton" data-value=")">)</button> -->
        </div>


        <div id="numOperators">
            <button class="numButton" data-value="1">1</button>
            <button class="numButton" data-value="2">2</button>
            <button class="numButton" data-value="3">3</button>
            <button class="operatorButton" data-value="+">+</button>
            <button class="numButton" data-value="4">4</button>
            <button class="numButton" data-value="5">5</button>
            <button class="numButton" data-value="6">6</button>
            <button class="operatorButton" data-value="-">-</button>
            <button class="numButton" data-value="7">7</button>
            <button class="numButton" data-value="8">8</button>
            <button class="numButton" data-value="9">9</button>
            <button class="operatorButton" data-value="*">*</button>
            <button class="numButton" data-value=".">.</button>
            <button class="numButton" data-value="0">0</button>
            <button class="operatorButton" data-value="%">%</button>
            <button class="operatorButton" data-value="/">/</button>
        </div>


        <div id="bottomFunctionality">
            <button id="equalsButton">=</button>
        </div>
    </section>


    <script src="main.js"></script>
</body>
</html>
