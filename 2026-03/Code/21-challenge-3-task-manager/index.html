<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Task Manager</title>
</head>
<body>
    
    <h1>Task Manager</h1>

    <section>
        <h2 class="hidden">Form To Add New Task</h2>

        <form action="#" id="addNewTask">
            <label for="newTask">Add New Task</label>
            <input type="text" id="newTask">
            <button class="addTaskButton">Add</button>
        </form>
    </section>

    <section>
        <h2>Tasks Needinging Attention</h2>

        <div id="currentTaskContainer"></div>
    </section>

    <section>
        <h2>Completed Tasks</h2>

        <div id="completedTaskContainer"></div>
    </section>




    <script src="main.js"></script>
</body>
</html>
